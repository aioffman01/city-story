<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도시이야기 - 로그인</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <h1>도시이야기</h1>
        <p class="subtitle">계속하려면 아이디와 비밀번호를 입력하십시오.</p>
        
        <div id="errorBox" class="error-msg">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span>아이디 또는 비밀번호가 올바르지 않습니다.</span>
        </div>

        <div id="successBox" class="error-msg" style="background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); color: #10b981;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <span>회원가입이 완료되었습니다. 로그인 해주세요.</span>
        </div>

        <form action="login.php" method="POST" id="loginForm">
            <div class="form-group">
                <label for="user_id">아이디</label>
                <div class="input-wrapper">
                    <input type="text" id="user_id" name="user_id" placeholder="ID 입력" required>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
            </div>
            
            <button type="submit" class="btn-submit">입장하기</button>
        </form>

        <div class="login-footer" style="margin-top: 2rem; font-size: 0.95rem; color: var(--text-secondary);">
            계정이 없으신가요? <a href="register.php" style="color: var(--primary-color); text-decoration: none; font-weight: 600; transition: var(--transition);" onmouseover="this.style.color='var(--secondary-color)'" onmouseout="this.style.color='var(--primary-color)'">회원가입</a>
        </div>
    </div>

    <script>
        // URL의 쿼리 스트링에서 파라미터를 읽어와 처리
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'invalid') {
            const errorBox = document.getElementById('errorBox');
            errorBox.style.display = 'flex';
        }
        if (urlParams.get('register') === 'success') {
            const successBox = document.getElementById('successBox');
            successBox.style.display = 'flex';
        }
    </script>
</body>
</html>
